name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kód letöltése (Checkout)
      uses: actions/checkout@v4

    - name: Java 17 beállítása
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle telepítése
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Hiányzó Gradle Wrapper generálása a szerveren
      run: gradle wrapper

    - name: Futtatási jogosultság adása
      run: chmod +x gradlew

    - name: Alkalmazás fordítása (APK generálás)
      run: ./gradlew assembleDebug

    - name: Kész APK fájl kimentése (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: all-in-one-tester-app
        path: app/build/outputs/apk/debug/app-debug.apk
